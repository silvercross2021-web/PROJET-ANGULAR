<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="Portfolio créatif — Développeur Front-End & Créatif">
  <meta name="keywords" content="portfolio, développeur, angular, frontend, créatif, three.js, gsap">
  <meta name="robots" content="index, follow">

  <title>Silver/Cross — Développeur Créatif</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Google Fonts are loaded in styles.scss via @import -->
</head>

<body>
  <app-root>
    <style>
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0c0c0c;
        z-index: 9999;
        font-family: sans-serif;
      }

      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #ffffff;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div class="initial-loader">
      <div class="loader-spinner"></div>
    </div>
  </app-root>
</body>

</html>
