<header class="header" [class.dark]="isDark" [class.menu-open]="menuOpen">

    <!-- LEFT: Logo + Nom -->
    <div class="header-left">
        <a routerLink="/" class="logo-link" (click)="closeMenuIfOpen()">
            <svg class="logo-svg" viewBox="0 0 50 50" fill="none">
                <path d="M10 38 Q18 8 25 25 Q32 42 40 12" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
        </a>
        <span class="site-name">silver/cross</span>
    </div>

    <!-- RIGHT: Lang + Dark toggle + Menu button -->
    <div class="header-right">
        <div class="lang-switch" translate="no" (click)="toggleLang()" style="cursor:pointer">
            <span [class.active]="(langService.lang$ | async) === 'fr'">FR</span>
            <span class="sep">/</span>
            <span [class.active]="(langService.lang$ | async) === 'en'">EN</span>
        </div>

        <!-- Bouton Son (Music toggle) -->
        <button class="sound-btn" [class.playing]="!isMuted" (click)="toggleSound()" [title]="isMuted ? 'Activer le son' : 'Couper le son'">
            <!-- Icône quand muet (Speaker off) -->
            <svg *ngIf="isMuted" class="speaker-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
            
            <!-- Animation de vagues quand ça joue -->
            <div *ngIf="!isMuted" class="sound-waves">
                <span class="wave"></span>
                <span class="wave"></span>
                <span class="wave"></span>
                <span class="wave"></span>
            </div>
        </button>

        <!-- Bouton dark mode (lune / soleil) -->
        <button class="theme-btn" (click)="toggleDark()" [title]="isDark ? 'Clair' : 'Sombre'">
            <svg *ngIf="!isDark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            <svg *ngIf="isDark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
        </button>

        <!-- Bouton menu : grille de points / ✕ -->
        <button class="menu-btn" (click)="toggleMenu()" [attr.aria-label]="menuOpen ? 'Fermer menu' : 'Ouvrir menu'">
            <div class="menu-icon" [class.is-open]="menuOpen">
                <!-- Grille 3x3 dots -->
                <div class="dots-grid">
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span>
                </div>
                <!-- Croix qui apparaît -->
                <div class="close-x">
                    <span class="bar bar-1"></span>
                    <span class="bar bar-2"></span>
                </div>
            </div>
        </button>
    </div>

</header>
